name: Market Alert Monitor

on:
  schedule:
    # Runs on weekdays during US market hours
    # These UTC times correspond roughly to:
    # 9:30 AM ET, 11:30 AM ET, 1:30 PM ET, 3:30 PM ET during daylight saving time
    - cron: "30 13 * * 1-5"
    - cron: "30 15 * * 1-5"
    - cron: "30 17 * * 1-5"
    - cron: "30 19 * * 1-5"
  workflow_dispatch:

jobs:
  market-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Market Alert Script
        env:
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_APP_PASSWORD: ${{ secrets.ALERT_APP_PASSWORD }}
        run: python market_alert.py
